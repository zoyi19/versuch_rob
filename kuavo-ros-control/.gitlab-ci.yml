cleanup_ros_logs:
  stage: cleanup
  tags:
    - ocs2
  script:
    - |
      for dir in /home/leju/.ros /home/gitlab-ruuner/.ros; do
        if [ -d "$dir" ]; then
          echo "Cleaning old files in $dir"
          # -mindepth 1 保证不删除 .ros 自身
          # -mtime +7 匹配修改时间在 7 天以前的文件或目录
          # -exec rm -rf {} + 批量删除
          find "$dir" -mindepth 1 -mtime +7 -exec rm -rf {} +
        else
          echo "Directory $dir not found, skipping."
        fi
      done
    - |
      # 清理过期的 CI 缓存目录（7天前的）
      if [ -d "/home/carlos/CI/jobs_results" ]; then
        echo "Cleaning old CI cache directories in /home/carlos/CI/jobs_results"
        find "/home/carlos/CI/jobs_results" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +
      else
        echo "CI cache directory /home/carlos/CI/jobs_results not found, skipping."
      fi
  
publish_joint_cali_program:
  stage: publish_joint_cali
  tags: 
    - ocs2

  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "beta" || $CI_COMMIT_BRANCH == "dev"
      changes:
        - scripts/joint_cali/**          # 监听这个目录的改动
    # 其余情况不运行
    - when: never

  script:
    - set -euo pipefail
    - echo "Publish joint cali..."
    - cd scripts/joint_cali
    - chmod +x pack.sh
    - ./pack.sh
    - echo "kuavo_joint_cali_standalone info"
    - cat build_info.json || true
    - echo "Publish joint cali program"
    - cd dist
    - VERSION=$(git describe)
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        FILENAME_SUFFIX="${VERSION}"
        LATEST_SUFFIX="latest"
      else
        FILENAME_SUFFIX="${VERSION}-${CI_COMMIT_BRANCH}"
        LATEST_SUFFIX="latest-${CI_COMMIT_BRANCH}"
      fi
    - echo "正在重命名并上传版本 ${FILENAME_SUFFIX} 的 kuavo_joint_cali_standalone 到七牛云服务"
    - mv kuavo_joint_cali_standalone kuavo_joint_cali_standalone-${FILENAME_SUFFIX}
    - qshell rput --overwrite kuavo statics/kuavo_joint_cali_standalone-${FILENAME_SUFFIX} ./kuavo_joint_cali_standalone-${FILENAME_SUFFIX}
    - qshell rput --overwrite kuavo statics/kuavo_joint_cali_standalone-${LATEST_SUFFIX} ./kuavo_joint_cali_standalone-${FILENAME_SUFFIX}
    - if [ $? -ne 0 ]; then echo "Upload of version ${VERSION} failed in publish_joint_cali_program stage"; exit 1; fi
    - cd $CI_PROJECT_DIR/ci_scripts
    - sudo chmod +x wechat_bot_notify.sh
    - ./wechat_bot_notify.sh "关节标零程序 ${FILENAME_SUFFIX} 已发布到七牛云，下载地址 https://kuavo.lejurobot.com/statics/kuavo_joint_cali_standalone-${FILENAME_SUFFIX}" "$WECHAT_BOT_TOKEN"

cpp_lint:
  stage: cpp_lint
  tags:
    - ocs2
  script:
    - cd $CI_PROJECT_DIR/ci_scripts/tools/lint_tools/cppcheck_lint
    - bash cppcheck_lint_tool_xml.sh $CI_PROJECT_DIR
    - python3 count_severity.py ./cppcheck_results/cppcheck_report.xml baseline.txt
  artifacts:
    paths:
      - ci_scripts/tools/lint_tools/cppcheck_lint/cppcheck_results/cppcheck_report.xml
    when: always
    expire_in: 30 days


setup_env:
  stage: setup_env
  extends: .ros_before_script
  tags:
    - ocs2
  script:
    - ccache -s
    - ccache --set-config compiler_check=content
    - echo "Setup environment..."
    - cd ci_scripts
    - sudo chmod +x ci_install_dependencies.bash
    - ./ci_install_dependencies.bash

compile:
  stage: compile
  extends: .ros_before_script
  tags:
    - ocs2
  extends: .build_before_other_jobs
  retry:
    max: 2
    when:
      - script_failure
      - unknown_failure
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: never
    - if: $CI_COMMIT_BRANCH == "beta"
      when: never
    - if: $CI_COMMIT_BRANCH =~ /^opensource.*/
      when: never
    - if: $CI_COMMIT_BRANCH == "master"
      when: never
    - when: on_success
  script:
    - echo "Compiled :) "
  dependencies:
    - setup_env

