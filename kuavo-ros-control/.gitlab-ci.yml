variables:
  # 在项目目录下为每个 Job 单独创建一个 tmp/${CI_JOB_ID} 目录
  JOB_TMP_DIR: "${CI_PROJECT_DIR}/tmp/${CI_JOB_ID}/artifacts/"
  auto_test_grab_box_log_path: "${JOB_TMP_DIR}/auto_test_grab_box"
  auto_test_trace_path_log_path: "${JOB_TMP_DIR}/auto_test_trace_path"
  auto_test_arm_ik_log_path: "${JOB_TMP_DIR}/auto_test_arm_ik_sim"
  # 基于 CI_JOB_ID 的独立缓存目录
  CATKIN_WS_INSTALL_CACHE: "/home/carlos/CI/jobs_results/${CI_PIPELINE_ID}/catkin_ws_install"

workflow:
  rules:
    # 定时任务流水线始终运行
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Tag 流水线始终运行（用于发布 SDK 等）
    - if: $CI_COMMIT_TAG
    # 受保护分支在 push 时始终运行，保持原有行为
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "beta"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH =~ /^opensource.*/
    # Draft 状态的 MR 不触发 CI
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: never
    # 其他分支只在创建 Merge Request 时才触发 CI
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.ros_before_script:
  stage: ros_before_script
  before_script:
    - export ROBOT_VERSION=34
    - export LD_LIBRARY_PATH="/opt/drake/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
    - export PATH="/opt/drake/bin${PATH:+:${PATH}}"
    - export CC="ccache gcc"
    - export CXX="ccache g++"
    - ccache --max-size=10G
    - export ROBOT_VERSION=40
    - export PROJECT_VERSION_VAR=$(git describe)
  tags:
    - ocs2

.build_before_other_jobs:
  stage: build_before_other_jobs
  before_script:
    - git clean -xdf
    - mkdir -p $JOB_TMP_DIR
    - mkdir -p $auto_test_grab_box_log_path
    - mkdir -p $auto_test_trace_path_log_path
    - mkdir -p $auto_test_arm_ik_log_path
    - export ROBOT_VERSION=34
    - export LD_LIBRARY_PATH="/opt/drake/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
    - export PATH="/opt/drake/bin${PATH:+:${PATH}}"
    - export CC="ccache gcc"
    - export CXX="ccache g++"
    - ccache --max-size=10G
    - export ROBOT_VERSION=40
    - export PROJECT_VERSION_VAR=$(git describe)
    - echo "Sync opensource git remotes"
    - cd $CI_PROJECT_DIR
    - bash $CI_PROJECT_DIR/ci_scripts/git_fetch_opensource.sh
    - echo "Compiling..."
    - cd $CI_PROJECT_DIR
    - |
      # 检查是否存在有效的缓存
      if [ -d "$CATKIN_WS_INSTALL_CACHE/installed" ] && [ -f "$CATKIN_WS_INSTALL_CACHE/installed/setup.bash" ] && [ -d "$CATKIN_WS_INSTALL_CACHE/installed/lib" ]; then
        echo "Found valid cache at $CATKIN_WS_INSTALL_CACHE, copying instead of compiling..."
        rm -rf $CI_PROJECT_DIR/installed
        mkdir -p $CI_PROJECT_DIR/installed
        cp -r "$CATKIN_WS_INSTALL_CACHE/installed"/* $CI_PROJECT_DIR/installed/
        echo "Cache copy completed, skipping compilation and strip operations"
      else
        echo "No valid cache found at $CATKIN_WS_INSTALL_CACHE, proceeding with compilation..."
        git submodule update --init --recursive --force
        cd ci_scripts
        sudo chmod +x build.sh
        rm -rf $CI_PROJECT_DIR/installed
        mkdir -p $CI_PROJECT_DIR/installed
        ./build.sh -j6 -l6
        cd $CI_PROJECT_DIR
        rm -rf src/manipulation_nodes/motion_capture_ik
        if [[ "$CI_COMMIT_BRANCH" == "master" || "$CI_COMMIT_BRANCH" == "beta" || "$CI_COMMIT_BRANCH" == "dev" || "$CI_COMMIT_BRANCH" =~ ^opensource.* ]]; then
          unset https_proxy http_proxy all_proxy
          bash ./ci_scripts/extract_strip_upload_debinfo.sh
        else
          echo "Skipping extract_strip_upload_debinfo.sh on branch $CI_COMMIT_BRANCH"
        fi
        cd $CI_PROJECT_DIR/installed/lib && strip --strip-unneeded *.a *.so && cd -
        mkdir -p $CATKIN_WS_INSTALL_CACHE
        rm -rf $CATKIN_WS_INSTALL_CACHE/*
        cp -r $CI_PROJECT_DIR/installed $CATKIN_WS_INSTALL_CACHE
      fi
  tags:
    - ocs2

.nodejs_before_script:
  stage: nodejs_before_script
  before_script:
    - export PATH=~/.nvm/versions/node/v18.19.1/bin:$PATH
    - export LC_ALL=en_US.UTF-8
    - export LANG=en_US.UTF-8
    - export LANGUAGE=en_US.UTF-8
    - export NEWLINE=$'\n'
  tags:
    - macmini1

stages:
  - cleanup
  - cpp_lint
  - ros_before_script
  - setup_env
  - compile
  - build_before_other_jobs
  - clone_opensource_project
  - pull_opensource_project
  - sync_to_opensource
  - sync_hardware_lib
  - sync_kuavo_msgs_to_ros2
  - sync_kuavo_msgs_to_split_repo
  - sync_to_kuavo_rl
  - compile_docs
  - sync_docs
  - sync_tools
  - sync_tags
  - publish_sdk
  - publish_joint_cali
  - notify
  - notify_failure

