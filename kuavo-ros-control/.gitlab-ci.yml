publish_beta_sdk_to_pypi:
  stage: publish_sdk
  tags:
    - ocs2 # Or a specific runner tag if needed
  script:
    - pip install --upgrade twine urllib3
    - git clean -xdf
    - export ROBOT_VERSION=34
    - export LD_LIBRARY_PATH="/opt/drake/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
    - export PATH="/opt/drake/bin${PATH:+:${PATH}}"
    - source /opt/ros/noetic/setup.bash
    - export CC="ccache gcc"
    - export CXX="ccache g++"
    - ccache --max-size=10G
    - export ROBOT_VERSION=40
    - export PROJECT_VERSION_VAR=$(git describe)
    - echo "Compiling..."
    - cd $CI_PROJECT_DIR
    - git submodule update --init --recursive --force
    - cd $CI_PROJECT_DIR
    - catkin config --no-install -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_ASM_COMPILER=/usr/bin/as
    - catkin build -j6 -l6 humanoid_controllers
    - catkin build -j6 -l6 motion_capture_ik
    # Fetch the target branches
    - git fetch origin dev master
    - |
      # Unset proxy environment variables before publishing to PyPI
      unset https_proxy
      unset http_proxy
      unset all_proxy

      echo "Checking for modified .msg or .srv files in this push..."
      # Calculate diff against dev and master
      diff_dev=$(git diff --name-only origin/dev...HEAD)
      diff_master=$(git diff --name-only origin/master...HEAD)
      count_dev=$(echo "$diff_dev" | wc -l)
      count_master=$(echo "$diff_master" | wc -l)
      if [ "$count_dev" -lt "$count_master" ]; then changed_files="$diff_dev"; else changed_files="$diff_master"; fi
      echo "Changed files in this push:"
      echo "$changed_files"
      
      if echo "$changed_files" | grep -qE '\.(msg|srv)$' || echo "$changed_files" | grep -qE '^src/kuavo_humanoid_sdk/'  || echo "$changed_files" | grep -qE '^src/kuavo_humanoid_websocket_sdk/'; then
        echo "Found modified .msg, .srv files or changes within src/kuavo_humanoid_sdk/. Proceeding with SDK publish to TestPyPI."
        cd ci_scripts
        bash ./publish_kuavo_humanoid_sdk.sh --branch "${CI_COMMIT_BRANCH}"
        bash ./publish_kuavo_humanoid_sdk_ws.sh --branch "${CI_COMMIT_BRANCH}"
        cd ..
        echo "Publishing Beta Kuavo SDK to TestPyPI..."
      else
        echo "No modified .msg, .srv files or changes within src/kuavo_humanoid_sdk/ found in this push. Skipping SDK publish to TestPyPI."
      fi
  only:
    - beta # Only run this job on the beta branch
    - /^testpipy\/chenmingfu\/.*/ # Also run for specific opensource branches


