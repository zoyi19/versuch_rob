sync_to_gitee:
  stage: sync_to_opensource
  extends: .build_before_other_jobs
  tags:
    - ocs2
  script:
    - echo "Sync to gitee..."
    - cd $CI_PROJECT_DIR
    - |
      # Retry function with exponential backoff
      retry_git_command() {
        local cmd="$1"
        local max_attempts=10
        local attempt=1
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts: $cmd"
          if eval "$cmd"; then
            echo "Command succeeded on attempt $attempt"
            return 0
          else
            if [ $attempt -eq $max_attempts ]; then
              echo "Command failed after $max_attempts attempts"
              return 1
            fi
            local delay=$((2**attempt))
            echo "Command failed, retrying in $delay seconds..."
            sleep $delay
            attempt=$((attempt + 1))
          fi
        done
      }
    - cd $temp_target_repo_path/git_repo/
    - git restore --staged .
    - git clean -dfx && git checkout .
    - retry_git_command "git fetch origin --prune"
    - if git show-ref --verify --quiet refs/remotes/origin/$CI_COMMIT_BRANCH; then
        echo "Remote branch $CI_COMMIT_BRANCH exists. Checking out.";
        git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH;
      else
        echo "Remote branch $CI_COMMIT_BRANCH does not exist. Creating and pushing the branch.";
        if git show-ref --verify --quiet refs/remotes/origin/main; then
          git checkout -B $CI_COMMIT_BRANCH origin/main;
        elif git show-ref --verify --quiet refs/remotes/origin/master; then
          git checkout -B $CI_COMMIT_BRANCH origin/master;
        elif git show-ref --verify --quiet refs/remotes/origin/dev; then
          git checkout -B $CI_COMMIT_BRANCH origin/dev;
        else
          git checkout -b $CI_COMMIT_BRANCH;
        fi;
        retry_git_command "git push -uf origin $CI_COMMIT_BRANCH";
      fi
    - git reset --hard origin/$CI_COMMIT_BRANCH
    - git restore --staged .
    - git clean -df
    - cd $CI_PROJECT_DIR
    - git checkout src/manipulation_nodes/motion_capture_ik
    - rm -rf docs_internal
    - cd ci_scripts
    - sudo chmod +x del_close_source_packs.sh
    - ./del_close_source_packs.sh close_source_packs.txt
    - cd ..
    - rsync -av --delete --exclude='.git' . $temp_target_repo_path/git_repo 
    - cd $temp_target_repo_path/git_repo
    - sudo rm -rf installed
    - mv readme_opensource.md readme.md
    - cp -r $CATKIN_WS_INSTALL_CACHE/installed installed
    - cd ci_scripts
    - ./del_close_source_packs.sh close_source_packs.txt
    - cd $temp_target_repo_path/git_repo
    - source installed/setup.bash
    - catkin build -j6 -l6 humanoid_controllers humanoid_plan_arm_trajectory planarmwebsocketservice gazebo_sim
    - cd $temp_target_repo_path/git_repo
    - catkin clean -d -b -L -y
    - rm .gitlab-ci.yml
    - rm -rf ci_scripts
    - rm ./src/manipulation_nodes/motion_capture_ik/src/plantIK.cc
    - python3 -c "import py_compile; py_compile.compile('src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.py', cfile='src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.pyc')" && rm src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.py && git add -f src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.pyc
    ## after cleanup motion_capture_ik
    - wget -qO - https://kuavo.lejurobot.com/statics/mit_license.txt | sed "s/<YEAR>/$(date +%Y)/g; s/<COPYRIGHT HOLDER>/Leju（Shenzhen）Robotics Co.Ltd./g" > LICENSE
    - git add . && git add -u
    - git commit -am "sync $CI_PROJECT_URL/commit/$CI_COMMIT_SHA " && retry_git_command "git push -f origin $CI_COMMIT_BRANCH"
    - bash $CI_PROJECT_DIR/ci_scripts/sync_to_gitee.sh;
    - cd $CI_PROJECT_DIR
    - git restore --staged .
    - git clean -dfx
    - git checkout .

  dependencies:
    - clone_source_code_of_opensource_project
  only:
    - dev
    - /^opensource.*/
    - master
    - beta

sync_to_github:
  stage: sync_to_opensource
  extends: .build_before_other_jobs
  tags:
    - ocs2
  script:
    - echo "Sync to GitHub..."
    - cd $CI_PROJECT_DIR
    - |
      # Retry function with exponential backoff
      retry_git_command() {
        local cmd="$1"
        local max_attempts=10
        local attempt=1
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts: $cmd"
          if eval "$cmd"; then
            echo "Command succeeded on attempt $attempt"
            return 0
          else
            if [ $attempt -eq $max_attempts ]; then
              echo "Command failed after $max_attempts attempts"
              return 1
            fi
            local delay=$((2**attempt))
            echo "Command failed, retrying in $delay seconds..."
            sleep $delay
            attempt=$((attempt + 1))
          fi
        done
      }
    - mkdir -p $temp_target_repo_path_github
    - cd $temp_target_repo_path_github
    - git clone $opensource_project_origin_github git_repo || echo "After clone github"
    - cd $temp_target_repo_path_github/git_repo
    - retry_git_command "git fetch origin"
    - rm -rf installed
    - git restore --staged .
    - git clean -dfx && git checkout .
    - if git show-ref --verify --quiet refs/remotes/origin/$CI_COMMIT_BRANCH; then
        echo "Branch $CI_COMMIT_BRANCH exists on remote. Checking out.";
        git restore --staged .;
        git clean -dfx && git checkout .;
        git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH;
      else
        echo "Branch $CI_COMMIT_BRANCH does not exist on remote. Creating new branch.";
        if git show-ref --verify --quiet refs/heads/$CI_COMMIT_BRANCH; then
          echo "Local branch $CI_COMMIT_BRANCH exists. Checking out and resetting.";
          git checkout $CI_COMMIT_BRANCH;
          git reset --hard HEAD;
        else
          echo "Creating new local branch $CI_COMMIT_BRANCH.";
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "Using origin/main as base branch";
            git checkout -b $CI_COMMIT_BRANCH origin/main;
          elif git show-ref --verify --quiet refs/remotes/origin/master; then
            echo "Using origin/master as base branch";
            git checkout -b $CI_COMMIT_BRANCH origin/master;
          elif git show-ref --verify --quiet refs/remotes/origin/dev; then
            echo "Using origin/dev as base branch";
            git checkout -b $CI_COMMIT_BRANCH origin/dev;
          else
            echo "No priority base branch found, creating from HEAD";
            git checkout -b $CI_COMMIT_BRANCH;
          fi;
        fi;
      fi
    - git reset --hard origin/$CI_COMMIT_BRANCH 2>/dev/null || echo "Branch doesn't exist on remote yet"
    - git restore --staged .
    - git clean -df
    - cd $CI_PROJECT_DIR
    - git checkout src/manipulation_nodes/motion_capture_ik
    - rm -rf docs_internal
    - cd ci_scripts
    - sudo chmod +x del_close_source_packs.sh
    - ./del_close_source_packs.sh close_source_packs.txt
    - cd ..
    - rsync -av --delete --exclude='.git' . $temp_target_repo_path_github/git_repo 
    - cd $temp_target_repo_path_github/git_repo
    - sudo rm -rf installed
    - mv readme_opensource.md readme.md
    - cp -r $CATKIN_WS_INSTALL_CACHE/installed installed
    - cd ci_scripts
    - ./del_close_source_packs.sh close_source_packs.txt
    - cd $temp_target_repo_path_github/git_repo
    - source installed/setup.bash
    - catkin build -j6 -l6 humanoid_controllers humanoid_plan_arm_trajectory planarmwebsocketservice gazebo_sim
    - cd $temp_target_repo_path_github/git_repo
    - catkin clean -d -b -L -y
    - rm .gitlab-ci.yml
    - rm -rf ci_scripts
    - rm ./src/manipulation_nodes/motion_capture_ik/src/plantIK.cc
    - python3 -c "import py_compile; py_compile.compile('src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.py', cfile='src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.pyc')" && rm src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.py && git add -f src/manipulation_nodes/motion_capture_ik/scripts/ik/torso_ik.pyc
    - echo "Checking for files larger than 80MB..."
    - large_files=$(find . -type f -size +80M ! -path "./.git/*" 2>/dev/null)
    - |
      if [ -n "$large_files" ]; then
        echo "Found files larger than 80MB that will be removed:"
        echo "$large_files"
        echo "$large_files" | while read -r file; do
          if [ -f "$file" ]; then
            file_size=$(du -h "$file" | cut -f1)
            echo "Removing large file: $file (${file_size})"
            rm -f "$file"
          fi
        done
        echo "Completed removal of large files."
      else
        echo "No files larger than 80MB found."
      fi
    - git add . && git add -u
