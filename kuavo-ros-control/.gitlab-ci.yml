package_ws_deb:
  stage: sync_to_opensource
  extends: .build_before_other_jobs
  tags:
    - ocs2
  script:
    - echo "Creating Debian package..."
    - cd $CI_PROJECT_DIR
    # 检查 opensource 仓库是否存在，如果不存在（可能在不同的 runner 上运行）则自己克隆
    - |
      if [ ! -d "$temp_target_repo_path/git_repo/.git" ]; then
        echo "Opensource repo not found at $temp_target_repo_path/git_repo, cloning it..."
        mkdir -p $temp_target_repo_path
        cd $temp_target_repo_path
        rm -rf git_repo
        git clone $opensource_project_origin git_repo
        cd $CI_PROJECT_DIR
      fi
    - cd $temp_target_repo_path/git_repo/
    - git restore --staged .
    - git clean -dfx && git checkout .
    - |
      # Retry function with exponential backoff
      retry_git_command() {
        local cmd="$1"
        local max_attempts=6
        local attempt=1
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts: $cmd"
          if eval "$cmd"; then
            return 0
          else
            if [ $attempt -eq $max_attempts ]; then
              echo "Command failed after $max_attempts attempts"
              return 1
            fi
            local delay=$((2**attempt))
            echo "Command failed, retrying in $delay seconds..."
            sleep $delay
            attempt=$((attempt + 1))
          fi
        done
      }
    - retry_git_command "git fetch origin --prune"
    - if git show-ref --verify --quiet refs/remotes/origin/$CI_COMMIT_BRANCH; then
        echo "Remote branch $CI_COMMIT_BRANCH exists. Checking out.";
        git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH;
      else
        echo "Remote branch $CI_COMMIT_BRANCH does not exist. Creating and pushing the branch.";
        if git show-ref --verify --quiet refs/remotes/origin/main; then
          git checkout -B $CI_COMMIT_BRANCH origin/main;
        elif git show-ref --verify --quiet refs/remotes/origin/master; then
          git checkout -B $CI_COMMIT_BRANCH origin/master;
        elif git show-ref --verify --quiet refs/remotes/origin/dev; then
          git checkout -B $CI_COMMIT_BRANCH origin/dev;
        else
          git checkout -b $CI_COMMIT_BRANCH;
        fi;
        git push -u origin $CI_COMMIT_BRANCH;
      fi
    - git reset --hard origin/$CI_COMMIT_BRANCH 2>/dev/null || echo "Branch doesn't exist on remote yet"
    - git restore --staged .
    - git clean -df
    - cd $CI_PROJECT_DIR
    - git checkout src/manipulation_nodes/motion_capture_ik
    - rm -rf docs_internal
    - cd ci_scripts
    - sudo chmod +x build.sh
    - sudo chmod +x del_close_source_packs.sh
    - ./del_close_source_packs.sh close_source_packs.txt
    - cd ..
    - VERSION=$(git describe --tags)
    - mkdir -p ./.version
    - git rev-parse HEAD > "./.version/GIT_COMMIT"
    - git rev-parse --abbrev-ref HEAD > "./.version/GIT_BRANCH"
    - git config --get remote.origin.url > "./.version/GIT_REMOTE"
    - git describe --tags > "./.version/GIT_TAG"
    - sudo rm -rf /opt/ros/leju
    - sudo mkdir -p /opt/ros/leju
    - sudo rsync -a --exclude=".git" . /opt/ros/leju
    - cd /opt/ros/leju
    - sudo rm -rf installed
    - mv readme_opensource.md readme.md
    # 使用 before_script 中准备好的 installed 目录（来自缓存或重新编译）
    - cp -r $CI_PROJECT_DIR/installed installed
    - cd ci_scripts
    - ./del_close_source_packs.sh close_source_packs.txt
    - cd /opt/ros/leju
    - sudo catkin clean -d -b -L -y
    - source installed/setup.bash
    - catkin build -j6 -l6 humanoid_controllers humanoid_plan_arm_trajectory planarmwebsocketservice gazebo_sim
    - cd /opt/ros/leju
    - sudo rm .gitlab-ci.yml
    - sudo rm -rf ci_scripts
    - sudo rm ./src/manipulation_nodes/motion_capture_ik/src/plantIK.cc
    - echo "📦 Start packaging..."
    - PKG_NAME=ros-leju-workspace
    - BUILD_DIR=$CI_PROJECT_DIR/deb_build/$PKG_NAME
    - PKG_DIR=$BUILD_DIR/opt/ros/leju
    - mkdir -p $PKG_DIR
    - rsync -a --exclude=".git" --exclude="build" /opt/ros/leju/ $PKG_DIR/
    - mkdir -p $BUILD_DIR/DEBIAN
    - mkdir -p $BUILD_DIR/usr/bin
    - cp ./scripts/leju_start.sh $BUILD_DIR/usr/bin/leju
    - sudo chmod 755 $BUILD_DIR/usr/bin/leju
    - |
      cat > $BUILD_DIR/DEBIAN/control <<EOF
      Package: $PKG_NAME
      Version: $VERSION
      Section: misc
      Priority: optional
      Architecture: amd64
      Maintainer: LejuRobot <LejuRobot@lejurobot.com>
      Description: Leju kuavo robot  Workspace under /opt/ros/leju
      EOF
    - dpkg-deb --build $BUILD_DIR $CI_PROJECT_DIR/deb_build/${PKG_NAME}_${VERSION}.deb
    - cd $CI_PROJECT_DIR/deb_build
    - echo "📤 Uploading to QiNiu Cloud..."
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        DEB_FILENAME="${PKG_NAME}_${VERSION}.deb"
      else
        DEB_FILENAME="${PKG_NAME}_${VERSION}-${CI_COMMIT_BRANCH}.deb"
      fi
    - echo "Uploading versioned package ${DEB_FILENAME}"
    - qshell rput --overwrite kuavo packages/${DEB_FILENAME} ./${PKG_NAME}_${VERSION}.deb
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        echo "Updating latest version for master branch..."
        qshell rput --overwrite kuavo packages/${PKG_NAME}_latest.deb ./${PKG_NAME}_${VERSION}.deb
      fi
    - if [ $? -ne 0 ]; then echo "Upload of version ${VERSION} failed in package_ws_deb stage"; exit 1; fi
    - echo "✅ Package uploaded successfully"
    - cd $CI_PROJECT_DIR/ci_scripts
    - sudo chmod +x wechat_bot_notify.sh
    - |
      # 根据分支发送不同的通知消息
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        ./wechat_bot_notify.sh "🎉 [正式版] Kuavo ROS 工作空间 Debian 包 ${VERSION} 已发布到七牛云" "$WECHAT_BOT_TOKEN"
        ./wechat_bot_notify.sh "📦 下载地址 https://kuavo.lejurobot.com/packages/${DEB_FILENAME}" "$WECHAT_BOT_TOKEN"
        ./wechat_bot_notify.sh "🔧 一键安装最新正式版 wget -O ${PKG_NAME}_latest.deb https://kuavo.lejurobot.com/packages/${PKG_NAME}_latest.deb && sudo dpkg -i ${PKG_NAME}_latest.deb" "$WECHAT_BOT_TOKEN"
        ./wechat_bot_notify.sh "📌 此版本已更新为最新正式版 (latest)" "$WECHAT_BOT_TOKEN"
      else
        ./wechat_bot_notify.sh "🚧 [${CI_COMMIT_BRANCH}分支] Kuavo ROS 工作空间 Debian 包 ${VERSION} 已发布到七牛云" "$WECHAT_BOT_TOKEN"
        ./wechat_bot_notify.sh "📦 下载地址 https://kuavo.lejurobot.com/packages/${DEB_FILENAME}" "$WECHAT_BOT_TOKEN"
        ./wechat_bot_notify.sh "🔧 安装命令 wget -O ${DEB_FILENAME} https://kuavo.lejurobot.com/packages/${DEB_FILENAME} && sudo dpkg -i ${DEB_FILENAME}" "$WECHAT_BOT_TOKEN"
        ./wechat_bot_notify.sh "⚠️ 注意 这是开发版本，非正式发布" "$WECHAT_BOT_TOKEN"
      fi
  only:
    - /^opensource.*/
    - master
    - beta
    - dev
