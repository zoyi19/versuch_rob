// 机器人状态协议: Robot send to VR
syntax = "proto3";
package protos;

import "protos/hand_wrench_srv.proto";

// 头文件，包含时间戳和消息ID
message Header {
  // 时间戳 (纳秒)
  int64 timestamp = 1;
  // 消息ID
  int64 id = 2;
}

message EndEffectorState {
  // none: 0
  // lejuclaw: 夹爪 ==> X2
  // qiangnao, revo2, qiangnao_touch: 灵巧手: ==> X12
  repeated double position = 1;
  repeated double velocity = 2;
  repeated double effort = 3;
}

message JointState {
  repeated double position = 1;
  repeated double velocity = 2;
  repeated double torque = 3;
}

// 手臂力反馈（各手臂 xyz 中最大的力）
message ArmForceFeedback {
  repeated double max_force = 1;  // 各末端 xyz 中最大的力，归一化到 0-255，索引0=左手末端, 索引1=右手末端，方便扩展
}

message RobotState {
  Header header = 1;
  EndEffectorState ee_state = 2;
  JointState joint_state = 3;
  ItemMassForceResponse item_mass_force_response = 4;
  optional ArmForceFeedback arm_force_feedback = 5;  // 左右末端最大力反馈数据（可选）
}