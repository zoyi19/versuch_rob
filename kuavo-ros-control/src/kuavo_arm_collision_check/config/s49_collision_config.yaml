# kuavo_arm_collision_check/config/s49_collision_config.yaml

# 每个关节或模型的膨胀系数 (单位: 米)
# 注:为防止ros参数不合理,这里将原本文件名字中的".""-"字符强制替换成了"_"进行匹配
inflation:
  # ========= 主体（torso & sensors） =========
  torso_STL: 0.010
  radar_STL: 0.010
  camera_STL: 0.010
  camera_base_STL: 0.010
  head_pitch_STL: 0.010
  head_yaw_STL: 0.010

  # ========= 左臂 Left Arm =========
  l_arm_yaw_STL: 0.010
  l_arm_roll_STL: 0.010
  l_arm_pitch_STL: 0.010
  l_forearm_STL: 0.010
  l_hand_pitch_STL: 0.010
  l_hand_roll_STL: 0.010
  l_hand_yaw_STL: 0.010
  l_hand_camera_STL: 0.010
  l_hand_tripod_STL: 0.010

  # ========= 左手 Left Hand =========
  l_palm_STL: 0.015
  l_thumb_prox_STL: 0.015
  l_thumb_dist_STL: 0.015
  l_index_prox_STL: 0.015
  l_index_dist_STL: 0.015
  l_middle_prox_STL: 0.015
  l_middle_dist_STL: 0.015
  l_ring_prox_STL: 0.015
  l_ring_dist_STL: 0.015
  l_little_prox_STL: 0.015
  l_little_dist_STL: 0.015

  # ========= 左腿 Left Leg =========
  l_leg_yaw_STL: 0.015
  l_leg_roll_STL: 0.015
  l_leg_pitch_STL: 0.015
  l_knee_STL: 0.015
  l_foot_pitch_STL: 0.015
  l_foot_roll_STL: 0.015

  # ========= 右臂 Right Arm =========
  r_arm_yaw_STL: 0.010
  r_arm_roll_STL: 0.010
  r_arm_pitch_STL: 0.010
  r_forearm_STL: 0.010
  r_hand_pitch_STL: 0.010
  r_hand_roll_STL: 0.010
  r_hand_yaw_STL: 0.010
  r_hand_camera_STL: 0.010
  r_hand_tripod_STL: 0.010

  # ========= 右手 Right Hand =========
  r_palm_STL: 0.015
  r_thumb_prox_STL: 0.015
  r_thumb_dist_STL: 0.015
  r_index_prox_STL: 0.015
  r_index_dist_STL: 0.015
  r_middle_prox_STL: 0.015
  r_middle_dist_STL: 0.015
  r_ring_prox_STL: 0.015
  r_ring_dist_STL: 0.015
  r_little_prox_STL: 0.015
  r_little_dist_STL: 0.015

  # ========= 右腿 Right Leg =========
  r_leg_yaw_STL: 0.015
  r_leg_roll_STL: 0.015
  r_leg_pitch_STL: 0.015
  r_knee_STL: 0.015
  r_foot_pitch_STL: 0.015
  r_foot_roll_STL: 0.015

# 碰撞过滤规则（不检测的关节对）
# 注意：关节名必须和模型加载时对应一致
collision_filter:
  - [zarm_r5_link, r_hand_tripod]
  - [zarm_l5_link, l_hand_tripod]
  - [r_palm, r_hand_tripod]
  - [l_palm, l_hand_tripod]
  - [zarm_r7_link, r_thumb_dist]
  - [zarm_l7_link, l_thumb_dist]
  - [r_hand_camera, r_thumb_dist]
  - [l_hand_camera, l_thumb_dist]
  - [zarm_r5_link, r_palm]
  - [zarm_l5_link, l_palm]

# 全局单边 link 屏蔽检查
# ignore_links:
#   - l_hand_tripod
#   - r_hand_tripod
