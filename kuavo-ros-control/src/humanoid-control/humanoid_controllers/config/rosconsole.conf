# ROS Console Configuration for Resource Management
# 减少日志输出以节省内存和磁盘空间

log4j.logger.ros=WARN
log4j.logger.ros.humanoid_controllers=INFO
log4j.logger.ros.nodelet=WARN

# 限制特定包的日志级别
log4j.logger.ros.robot_localization=ERROR
log4j.logger.ros.tf=ERROR
log4j.logger.ros.tf2=ERROR

# 设置日志输出格式
log4j.appender.console.layout.ConversionPattern=[${rostime}] [${thread}] [${logger}] [${level}]: ${message}

# 文件大小限制
log4j.appender.file.MaxFileSize=100MB
log4j.appender.file.MaxBackupIndex=5 