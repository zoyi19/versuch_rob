lejuclaw:
  # 基本PD与限流
  kp: 18.0                               # 比例增益系数，用于位置控制响应速度
  kd: 3.2                                # 微分增益系数，用于阻尼控制
  alpha: 0.2                             # 低通滤波器系数，用于信号平滑
  max_current: 2.5                       # 最大电流限制，防止过载保护，单位 A
  min_error_percent: 1.0                 # 最小误差阈值，基于行程百分比，用于判断到位精度，单位 %
  dt: 0.002                              # 控制周期，控制循环时间间隔，单位 s

  # 反冲与限位范围
  impact_current: 3.0                    # 冲击电流阈值，单位 A
  impact_duration_ms: 200                # 冲击持续时间，单位 ms
  impact_interval_ms: 800                # 冲击间隔时间，单位 ms
  limit_range_percent: 5.0               # 限位范围百分比，包括VR与非VR模式，在行程两端此范围内才执行反冲，单位 %
  stuck_detection_delay_ms: 50.0         # 卡死检测延迟时间，单位 ms [修改: 500→50, 恢复1.2.2的快速响应]
  stuck_detection_time_ms: 50.0          # 卡死检测持续时间，单位 ms [修改: 500→50, 恢复1.2.2的快速响应]
  stuck_position_threshold: 0.002        # 卡死位置阈值，小于此值认为卡死，单位 rad

  # 目标位置检测参数（用于判断是否接近目标位置，通过后才进行稳定检测）
  target_position_threshold: 1.0         # 目标位置检测阈值，100ms内位置变化小于此值则认为接近目标，单位 rad
  target_position_detection_time_ms: 100.0  # 目标位置检测时间，单位 ms

  # 稳定检测参数（用于若未到达目标位置，但处于稳定状态，为 ros 服务反馈已到达位置）
  stable_position_threshold: 0.005       # 稳定位置阈值，单位 rad [修改: 0.1→0.005, 恢复1.2.2的精确检测]
  stable_velocity_threshold: 0.1         # 稳定速度阈值，单位 rad/s
  stable_current_threshold: 1.0          # 稳定检测电流阈值，单位 A
  stable_detection_time_ms: 50.0         # 稳定检测时间，单位 ms [修改: 200→50, 恢复1.2.2的快速响应]
  grip_holding_current: 0.5              # 夹持状态维持电流，单位 A
  enable_100_position_holding_current: false  # 是否启用"100位置则维持电流"功能 [修改: true→false, 暂时禁用排除干扰]
  move_paw_timeout_ms: 4000              # 非VR模式下move_paw的超时时间，单位 ms

  # VR控制相关
  vr_control_timeout_ms: 60              # VR模式下的超时时间，单位 ms
  vr_stuck_detection_cycles: 50          # VR模式下卡死检测需要的周期个数，每个周期时长为cfg_DT，超过次数后不动，判断为卡死
  vr_stuck_position_threshold: 0.01      # VR模式下卡死位置阈值，连续VR_STUCK_DETECTION_CYCLES个周期内，位置变化都小于该弧度，认为夹爪卡死，单位 rad
  vr_target_position_threshold: 0.5      # VR模式下目标位置差值阈值，当目标位置与当前位置差值大于此值时才进行卡死检测，单位 rad
  vr_grip_position_threshold: 101.0      # VR模式下夹持位置阈值 [修改: 99.5→101, 禁用VR特殊夹持处理，避免左右不一致]
  vr_grip_holding_current: 0.4           # VR模式下夹持状态维持电流，当持续发送100位置时使用此电流进行夹持，单位 A

  # 渐变刹车参数（恢复1.2.2的机制，KP和KD同时乘以相同系数，保持阻尼比不变）
  brake_range_percent: 35.0              # 刹车范围百分比，在行程两端此范围内进行减速，单位 %
  brake_min_speed_factor: 0.01           # 刹车最小速度系数，在限位处速度降至最小值
  brake_curve_exponent: 40.0             # 刹车曲线指数，控制减速曲线形状
  target_proximity_brake_percent: 10.0   # 目标位置附近刹车范围，单位 %
  target_proximity_min_factor: 0.05      # 目标位置附近最小速度系数

  # 寻零/限位搜索
  zero_control_kp: 0.0                   # 零点控制比例增益，零点寻找时使用
  zero_control_kd: 1.0                   # 零点控制微分增益，零点寻找时使用
  zero_control_alpha: 1.5                # 零点控制低通滤波系数
  zero_control_max_current: 1.8          # 零点控制最大电流限制，单位 A，仅作最大电流限制保护使用
  stall_current_threshold: 1.5           # 堵转电流阈值，超过阈值后认为到达限位，单位 A
  stall_velocity_threshold: 0.10         # 堵转速度阈值，小于阈值后认为到达限位，单位 rad/s
  zero_control_dt: 0.001                 # 零点控制周期，单位 s
  zero_find_timeout_ms: 20000            # 零点寻找超时时间，单位 ms
  zero_wait_ms: 500                      # 零点等待时间，单位 ms
  open_limit_adjustment: 0.0             # 开限位调整值，百分比，单位 %（正数往行程外扩展，负数往行程内收缩）
  close_limit_adjustment: 0.0            # 关限位调整值，百分比，单位 %（正数往行程外扩展，负数往行程内收缩）
  target_velocity: 65.0                  # 限位寻找目标速度，单位 rad/s
  open_position_change_threshold: 0.03   # 开爪位置变化阈值，开爪过程位置变化大于该值，明确有开爪动作，才可进行高电流冲关爪，避免错方向，单位 rad
  close_stuck_current_threshold: 1.0     # 关爪卡死检测电流阈值，超过阈值后可判断为卡死状态，单位 A
  close_stuck_detection_threshold: 1.0   # 关爪卡死检测位置阈值，自开始关爪动作开始，小于阈值可判断为卡死状态，单位 rad
  close_startup_delay_ms: 1000           # 关爪启动卡死检测延时，避免电机启动初期运动位置过小的误判，单位 ms
  close_impact_current: 3.0              # 关爪冲击电流，单位 A
  close_impact_duration_ms: 200          # 关爪冲击持续时间，单位 ms
  close_impact_interval_ms: 800          # 关爪冲击间隔时间，单位 ms
  close_max_attempts: 10                 # 关爪最大尝试次数，达到次数后认为到达关爪限位
