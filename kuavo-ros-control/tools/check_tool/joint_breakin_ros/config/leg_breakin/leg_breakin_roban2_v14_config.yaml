# ============================================
# 磨线程序配置文件 (leg_breakin_roban2_v14)
# 机型：roban2_v14（13个电机）
# ============================================

# ==================== 动作配置 ====================
action:
  # 每个动作点的时长（秒）
  motion_duration_sec: 1.0
  
  # 腰部电机1的动作序列（单位：度）
  # 共11个动作点
  waist_action: [0, 0, 0, 0, 0, 0, 0, 80, 0, -80, 0]
  
  # 左腿电机2-7的动作序列（每个电机独立定义，相对位置，单位：度）
  # 每个电机有11个动作点
  # roban2_v14 左腿电机顺序：2, 3, 4, 5, 6, 7
  # 注意：右腿（ID 8-13）通过左腿动作映射：
  #   - ID 8  = -ID 2（反方向）
  #   - ID 9  = -ID 3（反方向）
  #   - ID 10 = -ID 4（反方向）
  #   - ID 11 = ID 5（同方向）
  #   - ID 12 = ID 6（同方向）
  #   - ID 13 = ID 7（同方向）
  left_leg_actions:
    - [0, 30, 90, 0, -100, 20, 0, 0, 0, 0, 0]      # 关节2（左腿关节1，11个动作点）
    - [0, 20, 60, 90, 0, 50, 0, 0, 0, 0, 0]        # 关节3（左腿关节2，11个动作点）
    - [0, 15, -15, 0, 0, -25, 0, 0, 0, 0, 0]       # 关节4（左腿关节3，11个动作点）
    - [0, 20, 100, 70, 0, 130, 0, 0, 0, 0, 0]      # 关节5（左腿关节4，11个动作点）
    - [0, -15, 0, -15, 15, -15, 0, 0, 0, 0, 0]     # 关节6（左腿关节5，11个动作点）
    - [0, 15, 0, -15, 15, -15, 0, 0, 0, 0, 0]      # 关节7（左腿关节6，11个动作点）

# ==================== 电机配置 ====================
motor:
  # 电机总数
  total_motors: 13
  
  # 电机分组
  waist_id: 1                         # 腰部电机ID
  left_leg_ids: [2, 3, 4, 5, 6, 7]    # 左腿电机ID
  right_leg_ids: [8, 9, 10, 11, 12, 13]  # 右腿电机ID（通过左腿映射）

