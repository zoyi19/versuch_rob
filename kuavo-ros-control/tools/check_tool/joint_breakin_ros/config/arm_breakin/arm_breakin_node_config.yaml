# ============================================
# 磨线程序配置文件 (arm_breakin_node)
# 机型：通用机型（手臂1-8 + 头部9-10）
# ============================================

# ==================== 动作配置 ====================
action:
  # 每帧动作的时长（毫秒）
  frame_duration_ms: 2000
  
  # 左臂动作关键帧数组（4个关节，单位：弧度偏置）
  # 左臂电机顺序：1, 2, 3, 4
  # 注意：右臂（ID 5-8）通过左臂动作映射：
  #   - ID 5 = ID 1（同方向）
  #   - ID 6 = -ID 2（反方向）
  #   - ID 7 = -ID 3（反方向）
  #   - ID 8 = ID 4（同方向）
  left_arm_actions:
    - [0.00, 0.00, 0.00, 0.00]  # 帧0
    - [-1.00, 1.00, 1.00, -1.50]  # 帧1
    - [-1.40, 1.80, 1.35, -0.20]  # 帧2
    - [0.00, 2.50, 0.00, -1.60]  # 帧3
    - [0.60, 1.50, -1.35, -2.00]  # 帧4
    - [1.40, 0.50, -1.00, -1.00]  # 帧5
    - [0.00, 0.00, 0.00, 0.00]  # 帧6
  
  # 头部电机动作关键帧数组（2个头部电机，单位：弧度偏置）
  # 头部电机ID：9, 10
  # 动作帧数与手臂动作保持一致
  head_actions:
    - [0.00, 0.00]   # 帧0
    - [1.00, 0.60]   # 帧1
    - [-1.00, 0.00]  # 帧2
    - [0.00, 0.00]   # 帧3
    - [1.00, 0.60]   # 帧4
    - [-1.00, 0.00]  # 帧5
    - [0.00, 0.00]   # 帧6

# ==================== 电机配置 ====================
motor:
  # 目标电机ID范围
  motor_id_min: 1   # 最小电机ID（左臂起始）
  motor_id_max: 10  # 最大电机ID（头部结束）
  
  # 电机分组
  left_arm_ids: [1, 2, 3, 4]      # 左臂电机ID
  right_arm_ids: [5, 6, 7, 8]     # 右臂电机ID（通过左臂映射）
  head_ids: [9, 10]                # 头部电机ID

